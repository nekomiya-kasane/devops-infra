<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络拓扑可视化 - coca.local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .vlan-zone { transition: opacity 0.3s; }
        .host-node { cursor: pointer; transition: transform 0.2s, filter 0.2s; }
        .host-node:hover { transform: scale(1.05); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .host-node.selected { filter: drop-shadow(0 0 8px #3b82f6); }
        .connection-line { stroke-width: 2; fill: none; opacity: 0.6; }
        .service-tag { font-size: 10px; }
        .detail-panel { transition: transform 0.3s, opacity 0.3s; }
        .hidden-panel { transform: translateX(100%); opacity: 0; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4">
        <div class="flex items-center justify-between flex-wrap gap-4">
            <h1 class="text-2xl font-bold text-sky-400">🌐 coca.local 网络拓扑</h1>
            <div class="flex items-center gap-4 flex-wrap">
                <!-- VLAN Filters -->
                <div class="flex gap-2 flex-wrap">
                    <button onclick="toggleVlan(10)" id="btn-vlan10" class="px-3 py-1 rounded text-xs font-medium bg-amber-600 hover:bg-amber-500">VLAN 10 SAN</button>
                    <button onclick="toggleVlan(20)" id="btn-vlan20" class="px-3 py-1 rounded text-xs font-medium bg-emerald-600 hover:bg-emerald-500">VLAN 20 Dev</button>
                    <button onclick="toggleVlan(30)" id="btn-vlan30" class="px-3 py-1 rounded text-xs font-medium bg-cyan-600 hover:bg-cyan-500">VLAN 30 Test</button>
                    <button onclick="toggleVlan(40)" id="btn-vlan40" class="px-3 py-1 rounded text-xs font-medium bg-violet-600 hover:bg-violet-500">VLAN 40 Server</button>
                    <button onclick="toggleVlan(99)" id="btn-vlan99" class="px-3 py-1 rounded text-xs font-medium bg-rose-600 hover:bg-rose-500">VLAN 99 Mgmt</button>
                </div>
                <!-- Search -->
                <input type="text" id="search-input" placeholder="搜索服务/IP/域名..." 
                    class="px-3 py-1 rounded bg-slate-700 border border-slate-600 text-sm w-48 focus:outline-none focus:border-sky-500"
                    oninput="handleSearch(this.value)">
            </div>
        </div>
    </header>

    <div class="flex">
        <!-- Main Topology Area -->
        <main class="flex-1 p-4 overflow-auto">
            <svg id="topology-svg" viewBox="0 0 1200 700" class="w-full h-auto bg-slate-800 rounded-lg border border-slate-700">
                <!-- VLAN Zones -->
                <g id="vlan-zones">
                    <!-- VLAN 99 Mgmt -->
                    <rect class="vlan-zone" data-vlan="99" x="20" y="20" width="200" height="660" rx="8" fill="#be123c" fill-opacity="0.15" stroke="#be123c" stroke-opacity="0.4"/>
                    <text x="30" y="45" fill="#fb7185" font-size="14" font-weight="bold">VLAN 99 管理区</text>
                    <text x="30" y="62" fill="#fda4af" font-size="10">10.99.99.0/24</text>
                    
                    <!-- VLAN 10 SAN -->
                    <rect class="vlan-zone" data-vlan="10" x="240" y="20" width="180" height="300" rx="8" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-opacity="0.4"/>
                    <text x="250" y="45" fill="#fbbf24" font-size="14" font-weight="bold">VLAN 10 存储专用</text>
                    <text x="250" y="62" fill="#fcd34d" font-size="10">10.10.10.0/24 MTU 9000</text>
                    
                    <!-- VLAN 40 Server Farm -->
                    <rect class="vlan-zone" data-vlan="40" x="440" y="20" width="540" height="400" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-opacity="0.4"/>
                    <text x="450" y="45" fill="#a78bfa" font-size="14" font-weight="bold">VLAN 40 服务区</text>
                    <text x="450" y="62" fill="#c4b5fd" font-size="10">10.40.40.0/24 静态IP</text>
                    
                    <!-- VLAN 20 Dev -->
                    <rect class="vlan-zone" data-vlan="20" x="440" y="440" width="260" height="240" rx="8" fill="#059669" fill-opacity="0.15" stroke="#059669" stroke-opacity="0.4"/>
                    <text x="450" y="465" fill="#34d399" font-size="14" font-weight="bold">VLAN 20 开发区</text>
                    <text x="450" y="482" fill="#6ee7b7" font-size="10">10.20.0.0/20 DHCP</text>
                    
                    <!-- VLAN 30 Test -->
                    <rect class="vlan-zone" data-vlan="30" x="720" y="440" width="260" height="240" rx="8" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-opacity="0.4"/>
                    <text x="730" y="465" fill="#22d3ee" font-size="14" font-weight="bold">VLAN 30 测试区</text>
                    <text x="730" y="482" fill="#67e8f9" font-size="10">10.30.0.0/20 DHCP</text>
                </g>

                <!-- Connection Lines -->
                <g id="connections">
                    <!-- P-01 to Net-01 (VLAN 10, 40, 99) -->
                    <path class="connection-line" data-vlan="10" d="M 330 180 Q 330 280 120 280" stroke="#fbbf24"/>
                    <path class="connection-line" data-vlan="40" d="M 330 180 Q 400 200 500 200" stroke="#a78bfa"/>
                    <path class="connection-line" data-vlan="99" d="M 330 180 Q 200 180 120 180" stroke="#fb7185"/>
                    
                    <!-- P-02 to Net-01 (VLAN 10, 40, 99) -->
                    <path class="connection-line" data-vlan="10" d="M 330 120 Q 280 120 280 180 Q 280 250 120 320" stroke="#fbbf24"/>
                    <path class="connection-line" data-vlan="40" d="M 330 120 Q 400 100 500 100" stroke="#a78bfa"/>
                    <path class="connection-line" data-vlan="99" d="M 330 120 Q 200 120 120 120" stroke="#fb7185"/>
                    
                    <!-- P-02 to VMs -->
                    <line class="connection-line" data-vlan="40" x1="380" y1="120" x2="520" y2="150" stroke="#a78bfa" stroke-dasharray="4"/>
                    <line class="connection-line" data-vlan="40" x1="380" y1="120" x2="640" y2="150" stroke="#a78bfa" stroke-dasharray="4"/>
                    <line class="connection-line" data-vlan="40" x1="380" y1="120" x2="760" y2="150" stroke="#a78bfa" stroke-dasharray="4"/>
                    <line class="connection-line" data-vlan="40" x1="380" y1="120" x2="880" y2="150" stroke="#a78bfa" stroke-dasharray="4"/>
                    
                    <!-- Net-01 to Dev/Test zones -->
                    <path class="connection-line" data-vlan="20" d="M 120 400 Q 300 500 450 520" stroke="#34d399"/>
                    <path class="connection-line" data-vlan="30" d="M 120 450 Q 400 550 730 520" stroke="#22d3ee"/>
                </g>

                <!-- Host Nodes -->
                <g id="hosts">
                    <!-- Net-01 Switch -->
                    <g class="host-node" data-host="net-01" onclick="selectHost('net-01')">

                        <text x="120" y="380" text-anchor="middle" fill="#94a3b8" font-size="12">🔀</text>
                        <text x="120" y="400" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">Net-01</text>
                        <text x="120" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">switch-core</text>
                        <text x="120" y="435" text-anchor="middle" fill="#fb7185" font-size="9">99: .2</text>
                        <text x="120" y="448" text-anchor="middle" fill="#a78bfa" font-size="9">40: .1 (GW)</text>
                    </g>
                    
                    <!-- P-01 TrueNAS -->
                    <g class="host-node" data-host="p-01" onclick="selectHost('p-01')">
                        <rect x="270" y="150" width="120" height="140" rx="8" fill="#1e293b" stroke="#475569"/>
                        <text x="330" y="175" text-anchor="middle" fill="#94a3b8" font-size="12">💾</text>
                        <text x="330" y="195" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">P-01</text>
                        <text x="330" y="213" text-anchor="middle" fill="#94a3b8" font-size="10">nas-core (TrueNAS)</text>
                        <text x="330" y="232" text-anchor="middle" fill="#fb7185" font-size="9">99: 10.99.99.10</text>
                        <text x="330" y="248" text-anchor="middle" fill="#fbbf24" font-size="9">10: 10.10.10.10</text>
                        <text x="330" y="264" text-anchor="middle" fill="#a78bfa" font-size="9">40: 10.40.40.5</text>
                    </g>
                    
                    <!-- P-02 PVE -->
                    <g class="host-node" data-host="p-02" onclick="selectHost('p-02')">
                        <rect x="270" y="80" width="120" height="60" rx="8" fill="#1e293b" stroke="#475569"/>
                        <text x="330" y="100" text-anchor="middle" fill="#94a3b8" font-size="12">🖥️</text>
                        <text x="330" y="118" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">P-02 pve-core</text>
                        <text x="330" y="133" text-anchor="middle" fill="#94a3b8" font-size="9">99:.20 | 10:.20 | 40:.6</text>
                    </g>
                    
                    <!-- VM-01 -->
                    <g class="host-node" data-host="vm-01" onclick="selectHost('vm-01')">
                        <rect x="470" y="100" width="100" height="90" rx="6" fill="#312e81" stroke="#6366f1"/>
                        <text x="520" y="120" text-anchor="middle" fill="#c7d2fe" font-size="10">🪟</text>
                        <text x="520" y="138" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">VM-01</text>
                        <text x="520" y="153" text-anchor="middle" fill="#a5b4fc" font-size="9">win-infra</text>
                        <text x="520" y="168" text-anchor="middle" fill="#a78bfa" font-size="9">10.40.40.10</text>
                        <text x="520" y="182" text-anchor="middle" fill="#94a3b8" font-size="8">AD/DNS/DHCP</text>
                    </g>
                    
                    <!-- VM-02 -->
                    <g class="host-node" data-host="vm-02" onclick="selectHost('vm-02')">
                        <rect x="590" y="100" width="100" height="90" rx="6" fill="#312e81" stroke="#6366f1"/>
                        <text x="640" y="120" text-anchor="middle" fill="#c7d2fe" font-size="10">🦊</text>
                        <text x="640" y="138" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">VM-02</text>
                        <text x="640" y="153" text-anchor="middle" fill="#a5b4fc" font-size="9">gitlab-core</text>
                        <text x="640" y="168" text-anchor="middle" fill="#a78bfa" font-size="9">10.40.40.20</text>
                        <text x="640" y="182" text-anchor="middle" fill="#94a3b8" font-size="8">GitLab</text>
                    </g>
                    
                    <!-- VM-03 -->
                    <g class="host-node" data-host="vm-03" onclick="selectHost('vm-03')">
                        <rect x="710" y="100" width="100" height="90" rx="6" fill="#312e81" stroke="#6366f1"/>
                        <text x="760" y="120" text-anchor="middle" fill="#c7d2fe" font-size="10">📦</text>
                        <text x="760" y="138" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">VM-03</text>
                        <text x="760" y="153" text-anchor="middle" fill="#a5b4fc" font-size="9">jfrog-art</text>
                        <text x="760" y="168" text-anchor="middle" fill="#a78bfa" font-size="9">10.40.40.30</text>
                        <text x="760" y="182" text-anchor="middle" fill="#94a3b8" font-size="8">JFrog</text>
                    </g>
                    
                    <!-- VM-04 -->
                    <g class="host-node" data-host="vm-04" onclick="selectHost('vm-04')">
                        <rect x="830" y="100" width="100" height="90" rx="6" fill="#312e81" stroke="#6366f1"/>
                        <text x="880" y="120" text-anchor="middle" fill="#c7d2fe" font-size="10">🐳</text>
                        <text x="880" y="138" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="bold">VM-04</text>
                        <text x="880" y="153" text-anchor="middle" fill="#a5b4fc" font-size="9">linux-apps</text>
                        <text x="880" y="168" text-anchor="middle" fill="#a78bfa" font-size="9">10.40.40.40</text>
                        <text x="880" y="182" text-anchor="middle" fill="#94a3b8" font-size="8">Docker Swarm</text>
                    </g>
                    
                    <!-- Dev Zone Clients -->
                    <g class="host-node" data-host="dev-clients" onclick="selectHost('dev-clients')">
                        <rect x="480" y="510" width="180" height="80" rx="6" fill="#064e3b" stroke="#10b981"/>
                        <text x="570" y="535" text-anchor="middle" fill="#6ee7b7" font-size="12">💻💻💻</text>
                        <text x="570" y="555" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="bold">开发者终端</text>
                        <text x="570" y="572" text-anchor="middle" fill="#a7f3d0" font-size="9">dev-{dept}-{id}.coca.local</text>
                        <text x="570" y="585" text-anchor="middle" fill="#6ee7b7" font-size="8">10.20.1.x ~ 10.20.14.x</text>
                    </g>
                    
                    <!-- Test Zone Clients -->
                    <g class="host-node" data-host="test-clients" onclick="selectHost('test-clients')">
                        <rect x="760" y="510" width="180" height="80" rx="6" fill="#164e63" stroke="#06b6d4"/>
                        <text x="850" y="535" text-anchor="middle" fill="#67e8f9" font-size="12">🧪🖥️🐳</text>
                        <text x="850" y="555" text-anchor="middle" fill="#cffafe" font-size="11" font-weight="bold">测试节点</text>
                        <text x="850" y="572" text-anchor="middle" fill="#a5f3fc" font-size="9">test-{id}.coca.local</text>
                        <text x="850" y="585" text-anchor="middle" fill="#67e8f9" font-size="8">10.30.1.x ~ 10.30.14.x</text>
                    </g>
                </g>
                
                <!-- Service Groups in VM-04 area -->
                <g id="service-groups">
                    <rect x="470" y="210" width="490" height="190" rx="6" fill="#1e1b4b" fill-opacity="0.5" stroke="#4c1d95" stroke-dasharray="4"/>
                    <text x="480" y="230" fill="#c4b5fd" font-size="11" font-weight="bold">Docker Swarm 服务集群 (VM-04: 10.40.40.40)</text>
                    
                    <!-- Service categories -->
                    <g transform="translate(480, 245)">
                        <rect width="75" height="50" rx="4" fill="#7c3aed" fill-opacity="0.3"/>
                        <text x="37" y="18" text-anchor="middle" fill="#ddd6fe" font-size="9" font-weight="bold">认证</text>
                        <text x="37" y="32" text-anchor="middle" fill="#a78bfa" font-size="8">Traefik</text>
                        <text x="37" y="44" text-anchor="middle" fill="#a78bfa" font-size="8">Keycloak</text>
                    </g>
                    <g transform="translate(560, 245)">
                        <rect width="75" height="50" rx="4" fill="#0891b2" fill-opacity="0.3"/>
                        <text x="37" y="18" text-anchor="middle" fill="#cffafe" font-size="9" font-weight="bold">CI/CD</text>
                        <text x="37" y="32" text-anchor="middle" fill="#67e8f9" font-size="8">Runner</text>
                        <text x="37" y="44" text-anchor="middle" fill="#67e8f9" font-size="8">SonarQube</text>
                    </g>
                    <g transform="translate(640, 245)">
                        <rect width="75" height="50" rx="4" fill="#059669" fill-opacity="0.3"/>
                        <text x="37" y="18" text-anchor="middle" fill="#d1fae5" font-size="9" font-weight="bold">协作</text>
                        <text x="37" y="32" text-anchor="middle" fill="#6ee7b7" font-size="8">Mattermost</text>
                        <text x="37" y="44" text-anchor="middle" fill="#6ee7b7" font-size="8">Outline</text>
                    </g>
                    <g transform="translate(720, 245)">
                        <rect width="75" height="50" rx="4" fill="#d97706" fill-opacity="0.3"/>
                        <text x="37" y="18" text-anchor="middle" fill="#fef3c7" font-size="9" font-weight="bold">镜像</text>
                        <text x="37" y="32" text-anchor="middle" fill="#fcd34d" font-size="8">APT/PyPI</text>
                        <text x="37" y="44" text-anchor="middle" fill="#fcd34d" font-size="8">NPM/NuGet</text>
                    </g>
                    <g transform="translate(800, 245)">
                        <rect width="75" height="50" rx="4" fill="#dc2626" fill-opacity="0.3"/>
                        <text x="37" y="18" text-anchor="middle" fill="#fecaca" font-size="9" font-weight="bold">监控</text>
                        <text x="37" y="32" text-anchor="middle" fill="#fca5a5" font-size="8">Grafana</text>
                        <text x="37" y="44" text-anchor="middle" fill="#fca5a5" font-size="8">Prometheus</text>
                    </g>
                    <g transform="translate(880, 245)">
                        <rect width="75" height="50" rx="4" fill="#4f46e5" fill-opacity="0.3"/>
                        <text x="37" y="18" text-anchor="middle" fill="#e0e7ff" font-size="9" font-weight="bold">工具</text>
                        <text x="37" y="32" text-anchor="middle" fill="#a5b4fc" font-size="8">CE/Draw</text>
                        <text x="37" y="44" text-anchor="middle" fill="#a5b4fc" font-size="8">DevDocs</text>
                    </g>
                    
                    <!-- More services row -->
                    <g transform="translate(480, 305)">
                        <rect width="155" height="35" rx="4" fill="#1e293b"/>
                        <text x="77" y="15" text-anchor="middle" fill="#94a3b8" font-size="8">MinIO | Portainer | Vault</text>
                        <text x="77" y="28" text-anchor="middle" fill="#64748b" font-size="8">Loki | Uptime Kuma | NetBox</text>
                    </g>
                    <g transform="translate(640, 305)">
                        <rect width="155" height="35" rx="4" fill="#1e293b"/>
                        <text x="77" y="15" text-anchor="middle" fill="#94a3b8" font-size="8">ZenTao | Nextcloud | Wiki</text>
                        <text x="77" y="28" text-anchor="middle" fill="#64748b" font-size="8">Selenium | Sentry | Adminer</text>
                    </g>
                    <g transform="translate(800, 305)">
                        <rect width="155" height="35" rx="4" fill="#1e293b"/>
                        <text x="77" y="15" text-anchor="middle" fill="#94a3b8" font-size="8">SourceGraph | Swagger</text>
                        <text x="77" y="28" text-anchor="middle" fill="#64748b" font-size="8">IT-Tools | CyberChef</text>
                    </g>
                </g>
                
                <!-- Legend -->
                <g transform="translate(1000, 20)">
                    <rect width="180" height="130" rx="6" fill="#0f172a" stroke="#334155"/>
                    <text x="90" y="25" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">图例</text>
                    <circle cx="25" cy="45" r="6" fill="#be123c"/><text x="40" y="49" fill="#fda4af" font-size="10">VLAN 99 管理</text>
                    <circle cx="25" cy="63" r="6" fill="#d97706"/><text x="40" y="67" fill="#fcd34d" font-size="10">VLAN 10 存储</text>
                    <circle cx="25" cy="81" r="6" fill="#7c3aed"/><text x="40" y="85" fill="#c4b5fd" font-size="10">VLAN 40 服务</text>
                    <circle cx="25" cy="99" r="6" fill="#059669"/><text x="40" y="103" fill="#6ee7b7" font-size="10">VLAN 20 开发</text>
                    <circle cx="25" cy="117" r="6" fill="#0891b2"/><text x="40" y="121" fill="#67e8f9" font-size="10">VLAN 30 测试</text>
                </g>
            </svg>
        </main>

        <!-- Detail Panel -->
        <aside id="detail-panel" class="w-80 bg-slate-800 border-l border-slate-700 p-4 detail-panel hidden-panel fixed right-0 top-16 h-[calc(100vh-4rem)] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 id="panel-title" class="text-lg font-bold text-sky-400">选择节点</h2>
                <button onclick="closePanel()" class="text-slate-400 hover:text-white">✕</button>
            </div>
            <div id="panel-content">
                <p class="text-slate-400">点击拓扑图中的节点查看详情</p>
            </div>
        </aside>
    </div>

    <!-- Service List Modal -->
    <div id="service-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-slate-800 rounded-lg p-6 max-w-4xl max-h-[80vh] overflow-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-sky-400">服务列表</h2>
                <button onclick="closeServiceModal()" class="text-slate-400 hover:text-white text-2xl">✕</button>
            </div>
            <div id="service-list" class="grid gap-2"></div>
        </div>
    </div>

    <script>
        // Data Model
        const vlans = [
            { id: 10, name: 'SAN Storage', cidr: '10.10.10.0/24', color: '#d97706', visible: true },
            { id: 20, name: 'Dev Zone', cidr: '10.20.0.0/20', color: '#059669', visible: true },
            { id: 30, name: 'Test Zone', cidr: '10.30.0.0/20', color: '#0891b2', visible: true },
            { id: 40, name: 'Server Farm', cidr: '10.40.40.0/24', color: '#7c3aed', visible: true },
            { id: 99, name: 'OOB Mgmt', cidr: '10.99.99.0/24', color: '#be123c', visible: true }
        ];

        const hosts = {
            'net-01': {
                name: 'Net-01', hostname: 'switch-core', role: '核心交换机', type: 'physical',
                nics: [
                    { vlan: 99, ip: '10.99.99.2' },
                    { vlan: 40, ip: '10.40.40.1', note: '网关' }
                ],
                services: []
            },
            'p-01': {
                name: 'P-01', hostname: 'nas-core', role: 'TrueNAS 存储', type: 'physical',
                nics: [
                    { vlan: 99, ip: '10.99.99.10' },
                    { vlan: 10, ip: '10.10.10.10', note: 'iSCSI' },
                    { vlan: 40, ip: '10.40.40.5' }
                ],
                services: ['TrueNAS Scale Web UI']
            },
            'p-02': {
                name: 'P-02', hostname: 'pve-core', role: 'PVE 宿主机', type: 'physical',
                nics: [
                    { vlan: 99, ip: '10.99.99.20' },
                    { vlan: 10, ip: '10.10.10.20', note: 'iSCSI' },
                    { vlan: 40, ip: '10.40.40.6' }
                ],
                services: ['Proxmox VE Web UI'],
                vms: ['vm-01', 'vm-02', 'vm-03', 'vm-04']
            },
            'vm-01': {
                name: 'VM-01', hostname: 'win-infra', role: 'Windows 基础服务', type: 'vm', parent: 'p-02',
                nics: [{ vlan: 40, ip: '10.40.40.10' }],
                services: ['Windows AD', 'DNS (PowerDNS)', 'DHCP', 'TFTP', 'WSUS']

        let selectedHost = null;

        function toggleVlan(vlanId) {
            const vlan = vlans.find(v => v.id === vlanId);
            vlan.visible = !vlan.visible;
            
            const btn = document.getElementById(`btn-vlan${vlanId}`);
            btn.style.opacity = vlan.visible ? '1' : '0.4';
            
            document.querySelectorAll(`[data-vlan="${vlanId}"]`).forEach(el => {
                el.style.opacity = vlan.visible ? '1' : '0.1';
            });
        }

        function selectHost(hostId) {
            // Clear previous selection
            document.querySelectorAll('.host-node').forEach(n => n.classList.remove('selected'));
            
            // Select new
            const node = document.querySelector(`[data-host="${hostId}"]`);
            if (node) node.classList.add('selected');
            
            selectedHost = hostId;
            showHostDetails(hostId);
        }

        function showHostDetails(hostId) {
            const host = hosts[hostId];
            if (!host) return;
            
            const panel = document.getElementById('detail-panel');
            const title = document.getElementById('panel-title');
            const content = document.getElementById('panel-content');
            
            panel.classList.remove('hidden-panel');
            title.textContent = `${host.name} - ${host.hostname}`;
            
            let html = `
                <div class="mb-4">
                    <span class="text-xs px-2 py-1 rounded ${host.type === 'physical' ? 'bg-emerald-900 text-emerald-300' : host.type === 'vm' ? 'bg-violet-900 text-violet-300' : 'bg-slate-700 text-slate-300'}">${host.type === 'physical' ? '物理机' : host.type === 'vm' ? '虚拟机' : '终端组'}</span>
                    <p class="text-slate-300 mt-2">${host.role}</p>
                </div>
                <div class="mb-4">
                    <h3 class="text-sm font-semibold text-slate-400 mb-2">网卡配置</h3>
                    <div class="space-y-1">
            `;
            
            host.nics.forEach(nic => {
                const vlan = vlans.find(v => v.id === nic.vlan);
                html += `
                    <div class="flex items-center gap-2 text-sm">
                        <span class="w-3 h-3 rounded-full" style="background: ${vlan?.color || '#666'}"></span>
                        <span class="text-slate-300">VLAN ${nic.vlan}:</span>
                        <span class="text-sky-400 font-mono">${nic.ip}</span>
                        ${nic.note ? `<span class="text-slate-500 text-xs">(${nic.note})</span>` : ''}
                    </div>
                `;
            });
            
            html += '</div></div>';
            
            // Services
            const hostServices = services.filter(s => s.host === hostId);
            if (hostServices.length > 0) {
                html += `
                    <div>
                        <h3 class="text-sm font-semibold text-slate-400 mb-2">运行服务 (${hostServices.length})</h3>
                        <div class="space-y-1 max-h-60 overflow-y-auto">
                `;
                hostServices.forEach(s => {
                    html += `
                        <div class="bg-slate-700 rounded px-2 py-1 text-sm">
                            <div class="font-medium text-slate-200">${s.name}</div>
                            <div class="text-xs text-sky-400 font-mono">${s.fqdn}</div>
                        </div>
                    `;
                });
                html += '</div></div>';
            }
            
            // VMs if physical host
            if (host.vms) {
                html += `
                    <div class="mt-4">
                        <h3 class="text-sm font-semibold text-slate-400 mb-2">托管虚拟机</h3>
                        <div class="flex flex-wrap gap-1">
                `;
                host.vms.forEach(vmId => {
                    const vm = hosts[vmId];
                    html += `<button onclick="selectHost('${vmId}')" class="px-2 py-1 bg-violet-900 text-violet-300 rounded text-xs hover:bg-violet-800">${vm.name}</button>`;
                });
                html += '</div></div>';
            }
            
            content.innerHTML = html;
        }

        function closePanel() {
            document.getElementById('detail-panel').classList.add('hidden-panel');
            document.querySelectorAll('.host-node').forEach(n => n.classList.remove('selected'));
            selectedHost = null;
        }

        function handleSearch(query) {
            query = query.toLowerCase().trim();
            if (!query) {
                document.querySelectorAll('.host-node').forEach(n => n.style.opacity = '1');
                return;
            }
            
            // Find matching services
            const matches = services.filter(s => 
                s.name.toLowerCase().includes(query) || 
                s.fqdn.toLowerCase().includes(query) || 
                s.ip.includes(query)
            );
            
            const matchingHosts = new Set(matches.map(m => m.host));
            
            // Also search hosts directly
            Object.entries(hosts).forEach(([id, h]) => {
                if (h.name.toLowerCase().includes(query) || 
                    h.hostname.toLowerCase().includes(query) ||
                    h.nics.some(n => n.ip.includes(query))) {
                    matchingHosts.add(id);
                }
            });
            
            // Highlight matching hosts
            document.querySelectorAll('.host-node').forEach(n => {
                const hostId = n.dataset.host;
                n.style.opacity = matchingHosts.has(hostId) ? '1' : '0.3';
            });
            
            // If single match, select it
            if (matchingHosts.size === 1) {
                selectHost([...matchingHosts][0]);
            }
        }

        function closeServiceModal() {
            document.getElementById('service-modal').classList.add('hidden');
            document.getElementById('service-modal').classList.remove('flex');
        }
